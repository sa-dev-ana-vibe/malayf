name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Machine gate: typecheck + lint + unit tests + production build.
      - run: npm run verify
      # E2E against the dev server.
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e
